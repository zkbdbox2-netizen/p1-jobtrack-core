services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Tells Python to look in /app when resolving imports.
      # Without this, `from app.config import settings` fails because Python
      # doesn't know to look inside the container's working directory.
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy   # waits until postgres is actually ready
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app               # mount app/ so --reload picks up changes instantly
      - ./alembic:/app/alembic       # mount alembic/ so you can run migrations from host
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"                  # expose so you can connect with a GUI like TablePlus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobtracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"                  # expose so you can inspect with redis-cli locally
    command: redis-server --appendonly yes  # persist data across container restarts

volumes:
  postgres_data:
